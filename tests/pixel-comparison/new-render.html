<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LastWave - New D3 v7 Rendering</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; background: #f0f0f0; font-family: sans-serif; }
    h2 { margin: 10px 0 5px; }
    .render-container { margin-bottom: 30px; background: white; display: inline-block; }
  </style>
</head>
<body>
  <h1>New Rendering (D3 v7)</h1>

  <h2>Simple Dataset (3 artists, 5 segments) — silhouette</h2>
  <div id="simple-silhouette" class="render-container"></div>

  <h2>Large Dataset (8 artists, 10 segments) — silhouette</h2>
  <div id="large-silhouette" class="render-container"></div>

  <h2>Simple Dataset — wiggle</h2>
  <div id="simple-wiggle" class="render-container"></div>

  <h2>Simple Dataset — expand</h2>
  <div id="simple-expand" class="render-container"></div>

  <h2>Simple Dataset — zero</h2>
  <div id="simple-zero" class="render-container"></div>

  <script src="wave-algorithms.js"></script>
  <script>
    var COLORS = [
      "#838B8B","#7A8B8B","#C1CDCD","#668B8B","#B4CDCD","#2F4F4F","#2F4F4F","#5F9F9F",
      "#C0D9D9","#528B8B","#E0EEEE","#96CDCD","#388E8E","#79CDCD","#D1EEEE","#8FD8D8"
    ];
    var BG_COLOR = "#ffffff";
    var FONT_COLOR = "#000000";
    var FONT_FAMILY = "sans-serif";

    var OFFSET_MAP = {
      silhouette: d3.stackOffsetSilhouette,
      wiggle:     d3.stackOffsetWiggle,
      expand:     d3.stackOffsetExpand,
      zero:       d3.stackOffsetNone
    };

    var simpleData = [
      { title: "Radiohead",   counts: [10, 25, 45, 30, 15] },
      { title: "Pink Floyd",  counts: [20, 15, 10, 32, 28] },
      { title: "Tame Impala", counts: [5, 12, 28, 20, 35] }
    ];

    var largeData = [
      { title: "Radiohead",        counts: [10, 25, 45, 30, 15, 20, 35, 40, 25, 10] },
      { title: "Pink Floyd",       counts: [20, 15, 10, 32, 28, 22, 18, 12, 8, 5] },
      { title: "Tame Impala",      counts: [5, 12, 28, 20, 35, 42, 38, 30, 22, 15] },
      { title: "Boards of Canada", counts: [15, 18, 12, 8, 5, 10, 15, 20, 25, 30] },
      { title: "Aphex Twin",       counts: [8, 5, 3, 12, 18, 25, 20, 15, 10, 8] },
      { title: "Sigur Ros",        counts: [3, 8, 15, 20, 10, 5, 8, 12, 18, 22] },
      { title: "Burial",           counts: [12, 10, 8, 5, 3, 2, 5, 8, 12, 15] },
      { title: "Four Tet",         counts: [2, 5, 10, 15, 20, 25, 30, 28, 22, 18] }
    ];

    var DEFAULT_WIDTH_PER_PEAK = 150;
    var DEFAULT_HEIGHT = 600;

    function renderNew(elementId, seriesData, offset) {
      var el = document.getElementById(elementId);
      var numSegments = seriesData[0].counts.length;
      var width = numSegments * DEFAULT_WIDTH_PER_PEAK;
      var height = DEFAULT_HEIGHT;

      // Pivot to tabular format (same as WaveVisualization.tsx)
      var keys = seriesData.map(function(s) { return s.title; });
      var tableData = [];
      for (var i = 0; i < numSegments; i++) {
        var row = { index: i };
        seriesData.forEach(function(s) { row[s.title] = s.counts[i] || 0; });
        tableData.push(row);
      }

      var stack = d3.stack()
        .keys(keys)
        .offset(OFFSET_MAP[offset] || d3.stackOffsetSilhouette)
        .order(d3.stackOrderNone);

      var stackedData = stack(tableData);

      var xScale = d3.scaleLinear().domain([0, numSegments - 1]).range([0, width]);
      var yMin = d3.min(stackedData, function(layer) { return d3.min(layer, function(d) { return d[0]; }); });
      var yMax = d3.max(stackedData, function(layer) { return d3.max(layer, function(d) { return d[1]; }); });
      var yScale = d3.scaleLinear().domain([yMin, yMax]).range([height, 0]);

      var area = d3.area()
        .x(function(d, i) { return xScale(i); })
        .y0(function(d) { return yScale(d[0]); })
        .y1(function(d) { return yScale(d[1]); })
        .curve(d3.curveCardinal);

      var svg = d3.select(el).append("svg")
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", "0 0 " + width + " " + height);

      // Background
      svg.append("rect")
        .attr("width", width)
        .attr("height", height)
        .attr("fill", BG_COLOR);

      // Paths
      svg.selectAll("path.wave")
        .data(stackedData)
        .join("path")
        .attr("class", "wave")
        .attr("d", function(d) { return area(d); })
        .attr("fill", function(d, i) { return COLORS[i % COLORS.length]; })
        .attr("stroke", BG_COLOR)
        .attr("stroke-width", 0.5);

      // Add labels using the shared wave algorithms
      addLabelsNew(svg, stackedData, seriesData, xScale, yScale, width, height, FONT_FAMILY, FONT_COLOR, 8);
    }

    renderNew("simple-silhouette", simpleData, "silhouette");
    renderNew("large-silhouette",  largeData,  "silhouette");
    renderNew("simple-wiggle",     simpleData, "wiggle");
    renderNew("simple-expand",     simpleData, "expand");
    renderNew("simple-zero",       simpleData, "zero");
  </script>
</body>
</html>
