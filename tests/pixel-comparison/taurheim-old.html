<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LastWave - Taurheim Comparison (Old vs New)</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@3.5.17/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/rickshaw@1.6.6/rickshaw.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rickshaw@1.6.6/rickshaw.min.css">
  <style>
    body { margin: 0; padding: 20px; background: #f0f0f0; font-family: sans-serif; }
    h2 { margin: 10px 0 5px; }
    .render-container { margin-bottom: 30px; background: white; display: inline-block; overflow: auto; max-width: 100%; }
    .rickshaw_graph .y_axis, .rickshaw_graph .x_axis, .rickshaw_legend { display: none !important; }
  </style>
</head>
<body>
  <h1>Taurheim — Old Rendering (Rickshaw + D3 v3)</h1>
  <h2>Last 3 months, default settings (silhouette, stroke on, labels on)</h2>
  <div id="taurheim-old" class="render-container"></div>

  <script src="wave-algorithms.js"></script>
  <script>
    var SCHEME = {
      backgroundColor: "#ffffff",
      fontColor: "#000000",
      schemeColors: [
        "#838B8B","#7A8B8B","#C1CDCD","#668B8B","#B4CDCD","#2F4F4F","#2F4F4F","#5F9F9F",
        "#C0D9D9","#528B8B","#E0EEEE","#96CDCD","#388E8E","#79CDCD","#D1EEEE","#8FD8D8",
        "#66CCCC","#ADEAEA","#70DBDB","#AEEEEE","#AFEEEE","#8DEEEE","#37FDFC","#008080",
        "#008B8B","#00CDCD","#00EEEE","#00FFFF","#00FFFF","#97FFFF","#BBFFFF","#E0FFFF",
        "#F0FFFF","#00CED1","#5F9EA0","#00868B","#00C5CD","#00E5EE","#00F5FF","#67E6EC",
        "#4A777A","#05EDFF","#53868B","#73B1B7","#05E9FF","#7AC5CD","#8EE5EE","#05B8CC",
        "#98F5FF","#B0E0E6","#C1F0F6","#39B7CD","#65909A","#0EBFE9","#C3E4ED","#68838B",
        "#63D1F4","#9AC0CD","#50A6C2","#ADD8E6","#B2DFEE","#00688B","#0099CC","#009ACD",
        "#00B2EE"
      ]
    };

    var DEFAULT_WIDTH_PER_PEAK = 150;
    var DEFAULT_HEIGHT = 600;

    // Load the cached series data
    fetch("taurheim-series-data.json").then(function(r) { return r.json(); }).then(function(seriesData) {
      var el = document.getElementById("taurheim-old");
      var numSegments = seriesData[0].counts.length;
      var width = numSegments * DEFAULT_WIDTH_PER_PEAK;
      var height = DEFAULT_HEIGHT;

      // Convert to Rickshaw format
      var colorIdx = 0;
      var rickshawData = seriesData.map(function(s) {
        return {
          name: s.title,
          color: SCHEME.schemeColors[colorIdx++ % SCHEME.schemeColors.length],
          data: s.counts.map(function(c, i) { return { x: i, y: c }; })
        };
      });

      var graph = new Rickshaw.Graph({
        element: el,
        width: width,
        height: height,
        renderer: "area",
        offset: "silhouette",
        stroke: true,
        preserve: true,
        series: rickshawData
      });
      graph.render();

      // Background
      var svg = d3.select(graph.element).select("svg");
      svg.insert("g", ":first-child").append("rect")
        .attr("width", "100%").attr("height", "100%")
        .attr("fill", SCHEME.backgroundColor);

      // Labels
      addLabelsOld(svg, graph.series, width, height, "sans-serif", SCHEME.fontColor, 8);
    });
  </script>
</body>
</html>
