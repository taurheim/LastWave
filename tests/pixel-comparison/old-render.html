<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LastWave - Old Rickshaw Rendering</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@3.5.17/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/rickshaw@1.6.6/rickshaw.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rickshaw@1.6.6/rickshaw.min.css">
  <style>
    body { margin: 0; padding: 20px; background: #f0f0f0; font-family: sans-serif; }
    h2 { margin: 10px 0 5px; }
    .render-container { margin-bottom: 30px; background: white; display: inline-block; }
    /* Hide Rickshaw's axis/legend chrome so we only see the wave */
    .rickshaw_graph .y_axis, .rickshaw_graph .x_axis, .rickshaw_legend { display: none !important; }
  </style>
</head>
<body>
  <h1>Old Rendering (Rickshaw + D3 v3)</h1>

  <h2>Simple Dataset (3 artists, 5 segments) — silhouette</h2>
  <div id="simple-silhouette" class="render-container"></div>

  <h2>Large Dataset (8 artists, 10 segments) — silhouette</h2>
  <div id="large-silhouette" class="render-container"></div>

  <h2>Simple Dataset — wiggle</h2>
  <div id="simple-wiggle" class="render-container"></div>

  <h2>Simple Dataset — expand</h2>
  <div id="simple-expand" class="render-container"></div>

  <h2>Simple Dataset — zero</h2>
  <div id="simple-zero" class="render-container"></div>

  <script src="wave-algorithms.js"></script>
  <script>
    var COLORS = [
      "#838B8B","#7A8B8B","#C1CDCD","#668B8B","#B4CDCD","#2F4F4F","#2F4F4F","#5F9F9F",
      "#C0D9D9","#528B8B","#E0EEEE","#96CDCD","#388E8E","#79CDCD","#D1EEEE","#8FD8D8"
    ];
    var BG_COLOR = "#ffffff";
    var FONT_COLOR = "#000000";
    var FONT_FAMILY = "sans-serif";

    var simpleData = [
      { title: "Radiohead",   counts: [10, 25, 45, 30, 15] },
      { title: "Pink Floyd",  counts: [20, 15, 10, 32, 28] },
      { title: "Tame Impala", counts: [5, 12, 28, 20, 35] }
    ];

    var largeData = [
      { title: "Radiohead",        counts: [10, 25, 45, 30, 15, 20, 35, 40, 25, 10] },
      { title: "Pink Floyd",       counts: [20, 15, 10, 32, 28, 22, 18, 12, 8, 5] },
      { title: "Tame Impala",      counts: [5, 12, 28, 20, 35, 42, 38, 30, 22, 15] },
      { title: "Boards of Canada", counts: [15, 18, 12, 8, 5, 10, 15, 20, 25, 30] },
      { title: "Aphex Twin",       counts: [8, 5, 3, 12, 18, 25, 20, 15, 10, 8] },
      { title: "Sigur Ros",        counts: [3, 8, 15, 20, 10, 5, 8, 12, 18, 22] },
      { title: "Burial",           counts: [12, 10, 8, 5, 3, 2, 5, 8, 12, 15] },
      { title: "Four Tet",         counts: [2, 5, 10, 15, 20, 25, 30, 28, 22, 18] }
    ];

    var DEFAULT_WIDTH_PER_PEAK = 150;
    var DEFAULT_HEIGHT = 600;

    function toRickshaw(seriesData) {
      var colorIdx = 0;
      return seriesData.map(function(s) {
        return {
          name: s.title,
          color: COLORS[colorIdx++ % COLORS.length],
          data: s.counts.map(function(c, i) { return { x: i, y: c }; })
        };
      });
    }

    function renderOld(elementId, seriesData, offset) {
      var el = document.getElementById(elementId);
      var numSegments = seriesData[0].counts.length;
      var width = numSegments * DEFAULT_WIDTH_PER_PEAK;
      var height = DEFAULT_HEIGHT;
      var rickshawData = toRickshaw(seriesData);

      var graph = new Rickshaw.Graph({
        element: el,
        width: width,
        height: height,
        renderer: "area",
        offset: offset,
        stroke: true,
        preserve: true,
        series: rickshawData
      });
      graph.render();

      // Add background rect (same as old code)
      var svg = d3.select(graph.element).select("svg");
      var bg = svg.insert("g", ":first-child");
      bg.append("rect")
        .attr("width", "100%")
        .attr("height", "100%")
        .attr("fill", BG_COLOR);

      // Add labels using the shared wave algorithms
      addLabelsOld(svg, graph.series, width, height, FONT_FAMILY, FONT_COLOR, 8);
    }

    renderOld("simple-silhouette", simpleData, "silhouette");
    renderOld("large-silhouette",  largeData,  "silhouette");
    renderOld("simple-wiggle",     simpleData, "wiggle");
    renderOld("simple-expand",     simpleData, "expand");
    renderOld("simple-zero",       simpleData, "zero");
  </script>
</body>
</html>
